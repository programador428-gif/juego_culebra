<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juego de la Serpiente - Taller</title>
  <link rel="stylesheet" href="serpiente.css">
</head>

<body>
  <main class="contenedor-juego">
    <h1>🐍 Juego de la Serpiente 🐍</h1>
    <p class="descripcion">
      ¡Bienvenido al clásico juego de la culebrita!
    </p>

    <section class="panel-info">
      <div class="tarjeta-info">
        <span>Puntaje</span>
        <strong id="puntaje">0</strong>
      </div>
      <div class="tarjeta-info">
        <span>Estado</span>
        <strong id="estado">Listo</strong>
      </div>
    </section>

    <canvas id="canvasJuego" width="250" height="250"></canvas>

    <section class="controles">
      <button id="arriba" onclick="cambiarDireccion('arriba')">⬆️</button>
      <button id="izquierda" onclick="cambiarDireccion('izquierda')">⬅️</button>
      <button id="pausa" onclick="pausarJuego()">⏸️</button>
      <button id="derecha" onclick="cambiarDireccion('derecha')">➡️</button>
      <button id="abajo" onclick="cambiarDireccion('abajo')">⬇️</button>
    </section>

    <section class="acciones">
      <button onclick="iniciarJuego()">Iniciar</button>
      <button class="secundario" onclick="reiniciarJuego()">Reiniciar</button>
    </section>

    <p id="mensaje" class="mensaje animacion-suave">¡Presiona iniciar para comenzar!</p>
  </main>

  <script src="serpiente.js"></script>
</body>

</html>
